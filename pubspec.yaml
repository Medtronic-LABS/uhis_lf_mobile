name: uhis_next
description: "UHIS Next — Powered by Medtronic Labs for frontline health worker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  flutter_secure_storage: ^9.2.2
  go_router: ^14.6.1
  provider: ^6.1.2
  crypto: ^3.0.6
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  url_launcher: ^6.3.1
  sqflite: ^2.4.1
  sqflite_sqlcipher: ^3.4.0
  sqflite_common_ffi_web: ^0.4.5+2
  http: ^1.2.0
  sqflite_common: ^2.5.4
  path: ^1.9.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  intl: ^0.19.0
  connectivity_plus: ^6.1.3
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  audio_waveforms: ^2.0.2
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.3
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-Variable.ttf
